# ThreadLens sample configuration — safe for public open-source use.
# Copy to /config/config.yaml and adjust hosts, URLs, and MQTT credentials locally.
# Never commit passwords or live network secrets to git.

site:
  name: "My ThreadLens Site"

mode: server

server:
  host: "0.0.0.0"
  port: 8128

agent:
  host: "0.0.0.0"
  port: 8129

storage:
  sqlite_path: "/data/threadlens.db"
  event_retention_days: 30

flapping:
  debounce_seconds: 30
  matter_node_availability_warning_24h: 3
  matter_node_availability_degraded_24h: 6
  matter_node_unavailable_critical_minutes: 30
  otbr_role_changes_warning_1h: 2
  otbr_role_changes_degraded_1h: 5
  mdns_service_flaps_warning_1h: 5
  mdns_service_flaps_degraded_1h: 15

otbr:
  poll_interval_seconds: 60
  request_timeout_seconds: 5
  allow_read_only_actions: false
  use_legacy_node_fallback: true

mqtt:
  enabled: true
  # Replace with your MQTT broker hostname or IP (e.g. homeassistant.local, 192.168.1.50).
  # broker.mqtt is shown as an example only — use whatever resolves on your LAN.
  host: "homeassistant.local"
  port: 1883
  username: null
  password: null
  discovery_prefix: "homeassistant"
  topic_prefix: "threadlens"
  retain_discovery: true
  retain_state: true
  publish_interval_seconds: 30
  per_trel_service_entities: false
  per_node_entities: true

mdns:
  enabled: true
  services:
    - "_trel._udp.local."
    - "_meshcop._udp.local."
    - "_matter._tcp.local."
    - "_matterc._udp.local."

otbrs:
  - id: "primary"
    name: "Primary OTBR"
    rest_url: "http://192.168.1.10:8081"
    agent_url: null
  - id: "secondary"
    name: "Secondary OTBR"
    rest_url: "http://192.168.1.11:8081"
    agent_url: null

matter:
  reconnect_initial_seconds: 5
  reconnect_max_seconds: 60
  request_timeout_seconds: 10
  # Optional read-only Matter read probes (disabled by default).
  # probes:
  #   mode: conservative
  #   schedule_enabled: true
  #   advanced:
  #     interval_seconds: 1800
  #     max_concurrent: 1
  # See docs/matter-read-probes.md

matter_servers:
  - id: "home"
    name: "Home Matter Server"
    websocket_url: "ws://192.168.1.10:5580/ws"
    variant: "python"

reports:
  redact_secrets: true

homeassistant:
  mqtt_discovery_enabled: true
