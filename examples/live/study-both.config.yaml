# ThreadLens both-mode example (server + agent in one container).
# Copy to your host and mount at /config/config.yaml.
# Set MQTT broker host and credentials in your local copy only — never commit secrets.

site:
  name: "My ThreadLens Site"

mode: both

server:
  host: "0.0.0.0"
  port: 8128

agent:
  host: "0.0.0.0"
  port: 8129

storage:
  sqlite_path: "/data/threadlens.db"
  event_retention_days: 30

flapping:
  debounce_seconds: 30

otbr:
  poll_interval_seconds: 60
  request_timeout_seconds: 5
  allow_read_only_actions: false
  use_legacy_node_fallback: true

# Replace broker.mqtt with your MQTT broker hostname or IP if needed.
mqtt:
  enabled: true
  host: "broker.mqtt"
  port: 1883
  username: null
  password: null
  discovery_prefix: "homeassistant"
  topic_prefix: "threadlens"
  retain_discovery: true
  retain_state: true
  publish_interval_seconds: 30
  per_trel_service_entities: false
  per_node_entities: true

mdns:
  enabled: true
  services:
    - "_trel._udp.local."
    - "_meshcop._udp.local."
    - "_matter._tcp.local."
    - "_matterc._udp.local."

otbrs:
  - id: "primary"
    name: "Primary OTBR"
    rest_url: "http://192.168.1.10:8081"
    agent_url: "http://192.168.1.10:8129"
  - id: "secondary"
    name: "Secondary OTBR"
    rest_url: "http://192.168.1.11:8081"
    agent_url: null

matter:
  reconnect_initial_seconds: 5
  reconnect_max_seconds: 60
  request_timeout_seconds: 10

matter_servers:
  - id: "home"
    name: "Home Matter Server"
    websocket_url: "ws://192.168.1.10:5580/ws"
    variant: "python"

reports:
  redact_secrets: true

homeassistant:
  mqtt_discovery_enabled: true
