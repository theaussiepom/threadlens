# ThreadLens 0.1.1 — Study Pi (192.168.100.4) both-mode live test config.
# Copy to the Study Pi and mount at /config/config.yaml.
# Set MQTT broker host and credentials locally. Do not commit passwords to git.

site:
  name: "Ben Home"

mode: both

server:
  host: "0.0.0.0"
  port: 8128

agent:
  host: "0.0.0.0"
  port: 8129

storage:
  sqlite_path: "/data/threadlens.db"
  event_retention_days: 30

flapping:
  debounce_seconds: 30

otbr:
  poll_interval_seconds: 60
  request_timeout_seconds: 5
  allow_read_only_actions: false
  use_legacy_node_fallback: true

# MQTT broker hostname (Home Assistant Mosquitto add-on or equivalent).
# Set username/password in your local copy only — never commit broker secrets.
mqtt:
  enabled: true
  host: "broker.mqtt"
  port: 1883
  username: null
  password: null
  discovery_prefix: "homeassistant"
  topic_prefix: "threadlens"
  retain_discovery: true
  retain_state: true
  publish_interval_seconds: 30
  per_trel_service_entities: false
  per_node_entities: true

mdns:
  enabled: true
  services:
    - "_trel._udp.local."
    - "_meshcop._udp.local."
    - "_matter._tcp.local."
    - "_matterc._udp.local."

otbrs:
  - id: study
    name: Study OTBR
    rest_url: http://192.168.100.4:8081
    agent_url: http://192.168.100.4:8129
  - id: lounge
    name: Lounge OTBR
    rest_url: http://192.168.100.7:8081
    agent_url: http://192.168.100.7:8129

matter:
  reconnect_initial_seconds: 5
  reconnect_max_seconds: 60
  request_timeout_seconds: 10

matter_servers:
  - id: study_matter
    name: Study Matter Server
    websocket_url: ws://192.168.100.4:5580/ws
    variant: python

reports:
  redact_secrets: true

homeassistant:
  mqtt_discovery_enabled: true
