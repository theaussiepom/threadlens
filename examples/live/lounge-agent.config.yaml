# ThreadLens agent-only example for a co-located diagnostics endpoint.
# Copy to your host and mount at /config/config.yaml.

site:
  name: "My ThreadLens Site"

mode: agent

server:
  host: "0.0.0.0"
  port: 8128

agent:
  host: "0.0.0.0"
  port: 8129

storage:
  sqlite_path: "/data/threadlens.db"
  event_retention_days: 30

mqtt:
  enabled: false

mdns:
  enabled: false

otbrs: []

matter_servers: []

reports:
  redact_secrets: true
