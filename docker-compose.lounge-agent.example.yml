# ThreadLens agent-only example
#
# Published image with host networking on Linux.
#
# Usage:
#   docker pull ghcr.io/theaussiepom/threadlens:0.1.2
#   docker compose -f docker-compose.lounge-agent.example.yml up -d

services:
  threadlens-agent:
    image: ghcr.io/theaussiepom/threadlens:0.1.2
    container_name: threadlens-agent
    restart: unless-stopped
    network_mode: host
    command: ["--mode", "agent"]
    volumes:
      - ./examples/live/lounge-agent.config.yaml:/config/config.yaml:ro
      - ./data/lounge-agent:/data
    environment:
      TZ: UTC
      THREADLENS_CONFIG_PATH: /config/config.yaml
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8129/api/v1/agent/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
