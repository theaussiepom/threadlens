site:
  name: "Home"

mode: server

server:
  host: "0.0.0.0"
  port: 8128

agent:
  host: "0.0.0.0"
  port: 8129

storage:
  sqlite_path: "/data/threadlens.db"
  event_retention_days: 30

flapping:
  debounce_seconds: 30
  matter_node_availability_warning_24h: 3
  matter_node_availability_degraded_24h: 6
  matter_node_unavailable_critical_minutes: 30
  otbr_role_changes_warning_1h: 2
  otbr_role_changes_degraded_1h: 5
  mdns_service_flaps_warning_1h: 5
  mdns_service_flaps_degraded_1h: 15

mqtt:
  enabled: true
  host: "homeassistant.local"
  port: 1883
  username: null
  password: null
  discovery_prefix: "homeassistant"
  topic_prefix: "threadlens"
  retain_discovery: true
  retain_state: true
  per_trel_service_entities: false
  per_node_entities: true

mdns:
  enabled: true
  services:
    - "_trel._udp.local."
    - "_meshcop._udp.local."
    - "_matter._tcp.local."
    - "_matterc._udp.local."

otbrs:
  - id: "primary"
    name: "Primary OTBR"
    rest_url: "http://192.168.1.10:8081"
    agent_url: null

matter_servers:
  - id: "home"
    name: "Home Matter Server"
    websocket_url: "ws://192.168.1.10:5580/ws"
    variant: "python"

reports:
  redact_secrets: true

homeassistant:
  mqtt_discovery_enabled: true
